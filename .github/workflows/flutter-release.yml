name: Build & Release Flutter Android App

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Get code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Setup Java (required for Android build)
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # 3. Setup Flutter SDK
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        cache: true

    # 4. Install dependencies
    - name: Install dependencies
      run: flutter pub get

    # 5. Analyze project
    - name: Analyze project
      run: flutter analyze

    # 6. Build APK (installable)
    - name: Build APK
      run: flutter build apk --release

    # 7. Build AAB (Play Store format)
    - name: Build App Bundle
      run: flutter build appbundle --release

    # 8. Upload APK artifact (downloadable)
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: kal-perfumes-apk
        path: build/app/outputs/flutter-apk/app-release.apk

    # 9. Upload AAB artifact (downloadable)
    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: kal-perfumes-aab
        path: build/app/outputs/bundle/release/app-release.aab
